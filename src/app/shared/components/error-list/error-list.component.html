@if (errores.length > 0) {
  <div class="rounded-lg border border-rose-200 bg-rose-50 p-4">
    <div class="flex items-start gap-3">
      <svg class="w-4 h-4 text-rose-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <div class="flex-1">
        <p class="text-xs font-semibold text-rose-700 mb-1">Corrige los siguientes datos antes de calcular:</p>
        <ul class="space-y-0.5">
          @for (e of errores; track e) {
            <li class="text-xs text-rose-600 flex items-center gap-1.5">
              <span class="w-1 h-1 rounded-full bg-rose-400 flex-shrink-0"></span>
              {{ e }}
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
}
